<!DOCTYPE html>
<html>
<head>
<title>Openflow</title>
</head>
<body>

<h1 style="font-family: Arial;">Openflow</h1>
<p style="font-family: Arial;">No messy ads, popups or wait times. It just works.</p>
<form action="/upload" method="POST" enctype="multipart/form-data">
  <input type="file" id="upload" name="upload">
  <input type="submit">
  <br><br>
	<input type="radio" name="expiry" value="1d"> 1 day  
	<input type="radio" name="expiry" value="7d"> 7 days  
	<input type="radio" name="expiry" value="30d"> 30 days
	<input type="radio" name="expiry" value="never"> Never
</form>
<p style="font-family: Arial;">When you submit the file, the page will refresh and present you with the link. Only files beneath 2gb in size are accepted</p>

<script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="ifbroken" data-color="#5F7FFF" data-emoji="♥️" data-font="Arial" data-text="Donate" data-outline-color="#000000" data-font-color="#ffffff" data-coffee-color="#FFDD00" ></script>

</body>
